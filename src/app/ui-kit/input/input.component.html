<mat-form-field appearance="fill" class="custom-input">
  <mat-label>{{label}}</mat-label>
  <input 
    matInput
    [type]="type"
    [placeholder]="placeholder"
    [formControl]="control"
    [required]="required"
    (blur)="onTouched()"
  >
  <mat-error *ngIf="errorMessage">
    {{ errorMessage }}
  </mat-error>
</mat-form-field>
